# =============================================================================
# Linear Shear Vacuum Model - Batch Configuration
# =============================================================================

# Define the input dataset
data_file: "virtual_vacuum_galaxy.csv"

# Define the folder where the .png plots will be saved
output_folder: "galaxy_rotation_curves"

# List the galaxies you want to generate plots for
# (Ensure the spelling matches the SPARC dataset)
target_galaxies:
  - name: "VIRTUAL"
    hv_fixed: 35.0  # Force a spherical, thick vacuum geometry
    description: "A theoretical pure-vacuum galaxy in perfect kinematic equilibrium. Baryons = 0."

